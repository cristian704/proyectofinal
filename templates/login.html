<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:400px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:25px;
            font-weight:bold;
        }

        .btn{
            width:100%;
            border-radius:10px;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>
<body>

<div class="login-box">

<h2>MiniDuolingo</h2>

<form method="POST">

<div class="mb-3">
<label>Usuario</label>
<input
type="text"
name="username"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input
type="password"
name="password"
class="form-control"
required>
</div>

<button class="btn btn-primary">
Iniciar Sesión
</button>

</form>

<hr>

<div class="text-center">
¿No tienes cuenta?<br><br>

<a href="/register" class="btn btn-success">
Crear Cuenta
</a>
</div>

</div>

</body>
</html>
