<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#43cea2,#185a9d);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.register-box{
width:430px;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h2{
text-align:center;
color:#198754;
margin-bottom:25px;
font-weight:bold;
}

.btn{
width:100%;
border-radius:10px;
}

</style>

</head>
<body>

<div class="register-box">

<h2>Crear Cuenta</h2>

<form method="POST">

<div class="mb-3">
<label>Usuario</label>
<input
type="text"
name="username"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Contraseña</label>
<input
type="password"
name="password"
class="form-control"
required>
</div>

<button class="btn btn-success">
Registrarse
</button>

</form>

<hr>

<div class="text-center">

<a href="/login" class="btn btn-primary">
Volver al Login
</a>

</div>

</div>

</body>
</html>
