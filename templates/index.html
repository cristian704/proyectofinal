<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>MiniDuolingo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container-box{
    max-width:900px;
    margin:40px auto;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.card-cat{
    transition:.3s;
    border-radius:15px;
}

.card-cat:hover{
    transform:scale(1.05);
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

a{
    text-decoration:none;
}

h1{
    color:#0d6efd;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container-box">

<h1 class="text-center">📚 MiniDuolingo</h1>

<h5 class="text-center mb-4">
Bienvenido <b>{{ user.username }}</b>
</h5>

<div class="row">

<div class="col-md-4 mb-3">
<a href="/play/colores">
<div class="card card-cat text-center p-4">
<h2>🎨</h2>
<h5>Colores</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/numeros">
<div class="card card-cat text-center p-4">
<h2>🔢</h2>
<h5>Números</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/animales">
<div class="card card-cat text-center p-4">
<h2>🐶</h2>
<h5>Animales</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/frutas">
<div class="card card-cat text-center p-4">
<h2>🍎</h2>
<h5>Frutas</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/prendas">
<div class="card card-cat text-center p-4">
<h2>👕</h2>
<h5>Prendas</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/paises">
<div class="card card-cat text-center p-4">
<h2>🌎</h2>
<h5>Países</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/comidas">
<div class="card card-cat text-center p-4">
<h2>🍕</h2>
<h5>Comidas</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/electrodomesticos">
<div class="card card-cat text-center p-4">
<h2>📺</h2>
<h5>Electrodomésticos</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/accesorios">
<div class="card card-cat text-center p-4">
<h2>🎧</h2>
<h5>Accesorios</h5>
</div>
</a>
</div>

<div class="col-md-4 mb-3">
<a href="/play/cuerpo">
<div class="card card-cat text-center p-4">
<h2>🧍</h2>
<h5>Partes del cuerpo</h5>
</div>
</a>
</div>

</div>

<div class="text-center mt-4">
<a href="/logout" class="btn btn-danger btn-lg">
🚪 Salir del Sistema
</a>
</div>

</div>

</body>
</html>
